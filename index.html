<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÉNESIS | Plataforma de Ingreso y Salida</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <img src="img/logo_.png" alt="Logo Génesis" class="logo">
        <div class="fechaHora">
            <div id="fecha"></div>
            <div id="hora"></div>
        </div>
    </header>

    <main>
        <section class="datos">
            <h2>Datos del funcionario</h2>
            <label>Número de cédula</label>
            <input type="text" id="cedula" autocomplete="off" autofocus>
            
            <label>Nombre</label>
            <input type="text" id="nombre" readonly>
            
            <label>Cargo</label>
            <input type="text" id="cargo" readonly>
            
            <div class="opciones">
                <label>
                    <input type="radio" name="tipo" value="Ingreso">
                    INGRESO
                </label>
                <label>
                    <input type="radio" name="tipo" value="Salida">
                    SALIDA
                </label>
            </div>
        </section>

        <section class="camara">
            <h2>Captura de evidencia</h2>
            <video id="video" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </section>
    </main>

    <footer>
        <button id="registrar">REGISTRAR</button>
        <div id="estado">Esperando registro...</div>
    </footer>

    <script src="app.js"></script>

</body>

</html>
